<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Aura Encina - Artista Visual</title>
    <style>
        /* Estilos generales del cuerpo */
        body {
            background-color: rgb(5, 0, 24);
            color: white;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100vh; /* Ocupa toda la altura de la pantalla */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Contenedor principal que divide la pantalla en dos */
        .container {
            display: flex;
            flex-direction: row; /* Alinea los elementos en fila (uno al lado del otro) */
            width: 90%; /* Margen lateral para que no toque los bordes */
            max-width: 1200px;
            align-items: center; /* Centra verticalmente ambos bloques */
            justify-content: space-between; /* Da espacio entre el texto y la imagen */
            gap: 50px;
        }

        /* Bloque de la izquierda (Texto) */
        .texto-portada {
            flex: 1; /* Toma la mitad del espacio */
            text-align: left; /* Alinea el texto a la izquierda */
        }

        h1 {
            font-size: 70px;
            margin: 0;
            line-height: 1.1;
        }

        h3 {
            font-size: 24px;
            font-weight: lighter;
            color: #aaa;
            margin: 10px 0 30px 0;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-right: 25px;
            font-size: 18px;
            border-bottom: 1px solid transparent;
            transition: 0.3s;
        }

        .nav-links a:hover {
            border-bottom: 1px solid white;
            color: #00aaff;
        }

        /* Bloque de la derecha (Imagen) */
        .imagen-portada {
            flex: 1; /* Toma la otra mitad del espacio */
            display: flex;
            justify-content: center; /* Centra la imagen dentro de su bloque */
        }

        .imagen-portada img {
            width: 100%; /* La imagen se adapta al tamaño del contenedor */
            max-width: 500px; /* Tamaño máximo para que no se pixele */
            height: auto;
            border-radius: 4px; /* Opcional: bordes suavizados */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Sombra para darle profundidad */
        }

        /* Ajuste para celulares (cuando la pantalla es pequeña) */
        @media (max-width: 768px) {
            .container {
                flex-direction: column; /* Se pone uno arriba del otro en móvil */
                text-align: center;
            }
            .texto-portada {
                text-align: center;
            }
            h1 { font-size: 45px; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="texto-portada">
            <header>
                <h1>Aura Encina</h1>
                <h3>Artista visual</h3>
            </header>

            <nav class="nav-links">
                <a href="obra.html">Obras</a>
                <a href="contacto.html">Contacto</a>
            </nav>
        </div>

        <div class="imagen-portada">
            <img src="img/IMG_2147_Original.jpeg" alt="Bodegon">
        </div>

    </div>

</body>
</html>
