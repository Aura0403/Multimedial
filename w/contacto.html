<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Estructura con Divisiones</title>

    <style>
        /* Estilo general del cuerpo */
        body {
            font-family: Arial, sans-serif;
            background-color: #07011a;
            margin: 0;
        
        color: white;
        /* Define que el color del texto sea negro */
        }

        /* Contenedor principal */
        .contenedor {
            width: 40%;
            margin: auto;
        }

        /* Sección o bloque */
        .bloque {
            background-color: rgb(37, 110, 167);
            margin: 10px 0;
            padding: 20px;
            border-radius: 10px;
        }

        /* Imagen */
        .bloque img {
            width: 100%;
            height: auto;
        }

        /* Encabezado */
        .bloque h2 {
            margin-top: 10px;
        }

        /* Texto */
        .bloque p {
            line-height: 1.5;
        }
    </style>

</head>

<body>

    <!-- Contenedor principal -->
    <div class="contenedor">
        <h1>Contacto</h1>
        

        <!-- BLOQUE 1 -->
        <div class="bloque">
            <img src="img/IMG_7136.jpeg" alt="" width="30"> 
            <h2></h2>
            <p>
                Correo: encinaaura@gmail.com
                
            </p>

            <p>
                Telefono: +56 985250165

            </p>
        </div>


         
            <a href="index.html">Inicio</a><br>
            <a href="contacto.html">Contacto</a>
           
            
        </div>

    </div>

</body>
</html>
